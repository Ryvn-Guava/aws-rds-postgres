name: Build & Release aws-rds-postgres

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - "**"
      - ".github/workflows/ryvn-aws-rds-postgres-release.yaml"
  pull_request:
    branches:
      - "main"
    paths:
      - "**"

jobs:
  release:
    uses: ryvn-technologies/ryvn-build-action/.github/workflows/release.yml@v2
    with:
      service_name: aws-rds-postgres
    permissions:
      contents: write
      id-token: write
    secrets:
      RYVN_CLIENT_ID: ${{ secrets.RYVN_CLIENT_ID }}
      RYVN_CLIENT_SECRET: ${{ secrets.RYVN_CLIENT_SECRET }}
